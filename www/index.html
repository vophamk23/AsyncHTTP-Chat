<!doctype html>
<html lang="en">
<head>
    <title>BKSysNet Welcome</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/styles.css" />
</head>
<body>
    <!-- Badge hiển thị Tên tài khoản đang đăng nhập -->
    <div style="position: absolute; top: 1.5rem; left: 1.5rem; background: rgba(255, 255, 255, 0.9); padding: 0.5rem 1rem; border-radius: 99px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); font-weight: 600; font-size: 0.9rem; color: var(--text-main); border: 1px solid var(--card-border); backdrop-filter: blur(5px); z-index: 99;">
      👤 Web User: <span id="currentOwnerName" style="color: var(--primary-color)">Khách</span>
    </div>

<div class="container">
    <h2>BKSysNet Domain</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">
        Welcome to the secure peer-to-peer network portal.
    </p>

    <!-- Optional: Add a more modern logo if you wish, removing width/height force values so CSS maintains aspect ratio -->
    <img src="images/welcome.png" alt="BKSysNet at HCMUT" style="max-width: 80%; border-radius: 12px; margin-bottom: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">  
    
    <div>
        <a href="/submit-info" class="btn">Register Peer Endpoint</a>
    </div>
</div>

<script>
  const _match = document.cookie.match(/username=([^;]+)/);
  const ownerNameElem = document.getElementById('currentOwnerName');
  if (ownerNameElem) ownerNameElem.innerText = _match ? _match[1] : "Unknown";
</script>
</body>
</html>
